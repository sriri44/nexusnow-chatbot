<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusNow AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ─────────────────────────────────────────────────────── */
    :root {
      --brand-primary:    #6B31FF;
      --brand-secondary:  #8b51ff;
      --brand-light:      #f3eeff;
      --brand-xlight:     #faf7ff;
      --accent-success:   #16a34a;
      --accent-error:     #dc2626;
      --accent-warning:   #d97706;
      --text-primary:     #18181b;
      --text-secondary:   #52525b;
      --text-muted:       #a1a1aa;
      --border-light:     #e4e4e7;
      --border-focus:     #6B31FF;
      --surface-white:    #ffffff;
      --surface-soft:     #f4f4f6;
      --shadow-widget:    0 20px 60px rgba(107, 49, 255, 0.18), 0 4px 16px rgba(0,0,0,0.08);
      --shadow-card:      0 2px 12px rgba(107, 49, 255, 0.08);
      --radius-widget:    20px;
      --radius-bubble:    16px;
      --radius-input:     10px;
      --radius-btn:       10px;
      --font-body:        'DM Sans', sans-serif;
      --font-mono:        'DM Mono', monospace;
      --transition-fast:  0.15s ease;
      --transition-med:   0.25s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #ede8ff 0%, #e8f4fd 60%, #f0eeff 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── Chat Container ────────────────────────────────────────────────────── */
    #chat-container {
      width: 440px;
      height: 680px;
      background: var(--surface-white);
      border-radius: var(--radius-widget);
      box-shadow: var(--shadow-widget);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      animation: widgetIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes widgetIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    #chat-header {
      background: linear-gradient(135deg, #5a22f0 0%, #8b51ff 100%);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    #chat-header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      border-radius: var(--radius-widget) var(--radius-widget) 0 0;
    }

    .header-avatar {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      position: relative; z-index: 1;
      overflow: hidden;
    }
    .header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .header-text { line-height: 1.3; position: relative; z-index: 1; }
    .header-title { font-weight: 700; font-size: 1rem; letter-spacing: -0.01em; }
    .header-status { font-size: 0.72rem; opacity: 0.85; display: flex; align-items: center; gap: 5px; }

    .status-dot {
      width: 6px; height: 6px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      animation: pulse-dot 2s ease infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-actions { margin-left: auto; display: flex; gap: 8px; z-index: 1; position: relative; }
    .header-icon-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: white;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 13px;
      transition: background var(--transition-fast);
    }
    .header-icon-btn:hover { background: rgba(255,255,255,0.25); }

    /* RAG status badge */
    .rag-badge {
      font-size: 0.62rem;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 20px;
      padding: 2px 7px;
      letter-spacing: 0.04em;
      font-weight: 600;
      position: relative; z-index: 1;
      margin-left: auto;
    }

    /* ── Chat Box ──────────────────────────────────────────────────────────── */
    #chat-box {
      flex: 1;
      padding: 20px 16px 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      min-height: 0;
    }

    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-track { background: transparent; }
    #chat-box::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    #chat-box::-webkit-scrollbar-thumb:hover { background: #bbb; }

    /* ── Message Rows ──────────────────────────────────────────────────────── */
    .message-row {
      display: flex;
      flex-direction: column;
      animation: msgIn 0.25s ease both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-row.user  { align-items: flex-end; }
    .message-row.bot   { align-items: flex-start; }

    .bot-row-inner {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 88%;
    }

    .bot-avatar-mini {
      width: 26px; height: 26px;
      background: linear-gradient(135deg, #6B31FF, #8b51ff);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      color: white;
      flex-shrink: 0;
      margin-bottom: 2px;
      overflow: hidden;
    }
    .bot-avatar-mini img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .message {
      padding: 11px 15px;
      border-radius: var(--radius-bubble);
      line-height: 1.65;
      word-wrap: break-word;
      overflow-wrap: anywhere;
      font-size: 0.875rem;
    }

    .user-msg {
      background: linear-gradient(135deg, #6B31FF, #7e45ff);
      color: white;
      border-bottom-right-radius: 4px;
      max-width: 82%;
      box-shadow: 0 2px 8px rgba(107,49,255,0.28);
    }

    .bot-msg {
      background: var(--surface-soft);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
      width: 100%;
    }

    /* Markdown rendering inside bot messages */
    .bot-msg strong { color: var(--brand-primary); }
    .bot-msg em { font-style: italic; color: var(--text-secondary); }
    .bot-msg a { color: var(--brand-primary); text-decoration: underline; text-underline-offset: 2px; }
    .bot-msg ul, .bot-msg ol { padding-left: 1.2em; margin: 6px 0; }
    .bot-msg li { margin-bottom: 3px; }
    .bot-msg code {
      background: rgba(107,49,255,0.08);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 0.82em;
      color: var(--brand-primary);
    }
    .bot-msg h3, .bot-msg h4 {
      color: var(--text-primary);
      font-size: 0.9rem;
      margin: 8px 0 4px;
    }
    .bot-msg hr {
      border: none;
      border-top: 1px solid var(--border-light);
      margin: 8px 0;
    }

    /* Source link */
    .source-link {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 4px;
      padding-left: 34px;
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .source-link::before { content: '⟐'; font-size: 10px; }

    /* ── Typing Indicator ──────────────────────────────────────────────────── */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 13px 16px;
      background: var(--surface-soft);
      border-radius: var(--radius-bubble);
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: #c4b5fd;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-7px); }
    }

    /* ── Input Area ────────────────────────────────────────────────────────── */
    #input-area {
      display: flex;
      border-top: 1px solid var(--border-light);
      padding: 12px 14px;
      gap: 8px;
      flex-shrink: 0;
      background: var(--surface-white);
      align-items: center;
    }

    #user-input {
      flex: 1;
      padding: 10px 16px;
      border: 1.5px solid var(--border-light);
      border-radius: 24px;
      outline: none;
      font-size: 0.875rem;
      font-family: var(--font-body);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      background: var(--surface-soft);
      color: var(--text-primary);
    }

    #user-input:focus {
      border-color: var(--brand-primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(107,49,255,0.08);
    }

    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: linear-gradient(135deg, #6B31FF, #8b51ff);
      color: white;
      border: none;
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: 0 2px 8px rgba(107,49,255,0.3);
    }
    #send-btn:hover  { opacity: 0.9; box-shadow: 0 4px 12px rgba(107,49,255,0.4); }
    #send-btn:active { transform: scale(0.94); }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    /* ── Demo Form ─────────────────────────────────────────────────────────── */
    .demo-form-wrapper {
      background: var(--surface-white);
      border: 1.5px solid #e0d6ff;
      border-radius: 14px;
      padding: 16px;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      box-shadow: var(--shadow-card);
    }

    .form-field-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .form-field-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .form-field-label .required-star { color: var(--accent-error); }

    .demo-form-wrapper input[type="text"],
    .demo-form-wrapper input[type="email"],
    .demo-form-wrapper input[type="date"],
    .demo-form-wrapper input[type="tel"],
    .field-select-custom {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border-light);
      border-radius: var(--radius-input);
      font-size: 0.85rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast);
      background: var(--surface-soft);
      color: var(--text-primary);
    }

    .demo-form-wrapper input:focus,
    .field-select-custom:focus {
      border-color: var(--brand-primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(107,49,255,0.08);
    }

    .demo-form-wrapper input.input-error  { border-color: var(--accent-error); background: #fff5f5; }
    .demo-form-wrapper input.input-success { border-color: var(--accent-success); }

    .char-counter {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      text-align: right;
      margin-top: 2px;
      transition: color var(--transition-fast);
      min-height: 14px;
    }
    .char-counter.warn   { color: var(--accent-warning); }
    .char-counter.danger { color: var(--accent-error); font-weight: 600; }

    .field-error-msg {
      font-size: 0.72rem;
      color: var(--accent-error);
      margin-top: 2px;
      display: none;
      align-items: center;
      gap: 4px;
    }
    .field-error-msg.visible { display: flex; }
    .field-error-msg::before { content: '⚠'; font-size: 10px; }

    /* Phone */
    .phone-field-row { display: flex; gap: 6px; align-items: stretch; }

    .country-code-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 9px 10px;
      border: 1.5px solid var(--border-light);
      border-radius: var(--radius-input);
      background: var(--surface-soft);
      cursor: pointer;
      font-size: 0.82rem;
      font-family: var(--font-body);
      color: var(--text-primary);
      white-space: nowrap;
      transition: border-color var(--transition-fast), background var(--transition-fast);
      flex-shrink: 0;
    }
    .country-code-btn:focus { outline: none; border-color: var(--brand-primary); box-shadow: 0 0 0 3px rgba(107,49,255,0.08); }
    .country-code-btn .cc-flag  { font-size: 15px; line-height: 1; }
    .country-code-btn .cc-code  { font-weight: 600; font-size: 0.8rem; color: var(--brand-primary); }
    .country-code-btn .cc-arrow { font-size: 10px; color: var(--text-muted); margin-left: 1px; }

    .phone-number-input{
  width:100%;
  min-width:0;
}

    .country-dropdown-panel {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: white;
      border: 1.5px solid #e0d6ff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(107,49,255,0.14), 0 2px 8px rgba(0,0,0,0.08);
      z-index: 100;
      overflow: hidden;
      animation: dropIn 0.18s ease both;
      max-width: 320px;
    }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-6px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .country-search-box { padding: 10px 12px 8px; border-bottom: 1px solid var(--border-light); }
    .country-search-input {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid var(--border-light);
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: var(--font-body);
      outline: none;
      background: var(--surface-soft);
    }
    .country-search-input:focus { border-color: var(--brand-primary); background: white; }

    .country-list { max-height: 180px; overflow-y: auto; padding: 4px 0; }
    .country-list::-webkit-scrollbar { width: 3px; }
    .country-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    .country-option {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background var(--transition-fast);
    }
    .country-option:hover    { background: var(--brand-xlight); }
    .country-option.selected { background: var(--brand-light); }
    .country-option .opt-flag { font-size: 16px; }
    .country-option .opt-name { flex: 1; color: var(--text-primary); font-weight: 500; }
    .country-option .opt-code { color: var(--brand-primary); font-weight: 600; font-family: var(--font-mono); font-size: 0.78rem; }

    /* ── Masked Input ───────────────────────── */

.masked-input-wrapper{
  position:relative;
  width:100%;
  display:flex;
  align-items:center;
}
.phone-mask-wrapper{
  position:relative;
  flex:1;
  display:flex;
  align-items:center;
}

.phone-mask-wrapper input{
  width:100% !important;
  min-width:0 !important;

  padding:9px 38px 9px 12px !important;

  border:1.5px solid var(--border-light) !important;
  border-radius:var(--radius-input) !important;

  background:var(--surface-soft) !important;

  font-size:0.85rem !important;
  font-family:var(--font-body) !important;

  outline:none;

  transition:
    border-color var(--transition-fast),
    box-shadow var(--transition-fast),
    background var(--transition-fast);
}

.phone-mask-wrapper input:focus{
  border-color:var(--brand-primary) !important;
  background:white !important;
  box-shadow:0 0 0 3px rgba(107,49,255,0.08) !important;
}
 
.masked-input-wrapper input{
  width:100%;
  padding-right:42px !important;
}

.mask-toggle-btn{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  border:none;
  background:transparent;
  cursor:pointer;
  font-size:16px;
  color:#6B31FF;
  display:flex;
  align-items:center;
  justify-content:center;
  width:24px;
  height:24px;
  z-index:5;
  pointer-events:auto;
}

.mask-toggle-btn:hover{
  opacity:0.8;
}
.masked{
  -webkit-text-security: disc !important;
  font-family: var(--font-body) !important;
  letter-spacing: normal !important;
}
    /* Timezone dropdown */
    .timezone-wrapper { position: relative; }

    .tz-btn {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border-light);
      border-radius: var(--radius-input);
      background: var(--surface-soft);
      cursor: pointer;
      font-size: 0.82rem;
      font-family: var(--font-body);
      color: var(--text-primary);
      text-align: left;
      display: flex; align-items: center; justify-content: space-between;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast);
    }
    .tz-btn:focus { outline: none; border-color: var(--brand-primary); box-shadow: 0 0 0 3px rgba(107,49,255,0.08); background: white; }
    .tz-btn .tz-value { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.8rem; }
    .tz-btn .tz-arrow { font-size: 10px; color: var(--text-muted); flex-shrink: 0; margin-left: 6px; }

    .tz-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: white;
      border: 1.5px solid #e0d6ff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(107,49,255,0.14);
      z-index: 99;
      overflow: hidden;
      animation: dropIn 0.18s ease both;
      display: none;
    }
    .tz-dropdown.open { display: block; }

    .tz-search-box { padding: 10px 12px 8px; border-bottom: 1px solid var(--border-light); }
    .tz-search-input {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid var(--border-light);
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: var(--font-body);
      outline: none;
      background: var(--surface-soft);
    }
    .tz-search-input:focus { border-color: var(--brand-primary); background: white; }

    .tz-list { max-height: 160px; overflow-y: auto; padding: 4px 0; }
    .tz-list::-webkit-scrollbar { width: 3px; }
    .tz-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    .tz-group-label {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 14px 4px;
    }

    .tz-option {
      padding: 7px 14px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background var(--transition-fast);
      display: flex; align-items: center; gap: 8px;
    }
    .tz-option:hover    { background: var(--brand-xlight); }
    .tz-option.selected { background: var(--brand-light); }
    .tz-offset { font-family: var(--font-mono); font-size: 0.75rem; color: var(--brand-primary); font-weight: 600; flex-shrink: 0; }
    .tz-abbr   { font-weight: 600; color: var(--text-secondary); font-size: 0.78rem; flex-shrink: 0; }
    .tz-label  { color: var(--text-secondary); font-size: 0.78rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Time select */
    .field-select-custom {
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236B31FF' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      cursor: pointer;
    }

    /* Submit button */
    .demo-submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #6B31FF, #8b51ff);
      color: white;
      border: none;
      padding: 11px;
      border-radius: var(--radius-btn);
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-body);
      letter-spacing: 0.01em;

    /* ── appendMessage ───────────────────────────────────────────────────────── */
    function appendMessage(role, text, source = null) {
      const chatBox = document.getElementById('chat-box');
      const row     = document.createElement('div');
      row.className = `message-row ${role === 'user' ? 'user' : 'bot'}`;

      if (role === 'assistant') {
        const inner  = document.createElement('div');
        inner.className = 'bot-row-inner';

        const avatar = document.createElement('div');
        avatar.className = 'bot-avatar-mini';
        avatar.appendChild(_makeBotAvatarImg());
        avatar.setAttribute('aria-hidden', 'true');

        const msgDiv = document.createElement('div');
        msgDiv.className = 'message bot-msg';

       if (
   text.includes('[[OPEN_DEMO_FORM]]')
) {

  const parts = text.split(
     '[[OPEN_DEMO_FORM]]'
  );
          if (parts[0].trim()) {
            const pre = document.createElement('div');
            pre.innerHTML = renderMarkdown(parts[0]);
            msgDiv.appendChild(pre);
          }
          const formId = `demo-form-${++demoFormCounter}`;
          msgDiv.appendChild(buildDemoForm(formId));
          if (parts[1]?.trim()) {
            const post = document.createElement('div');
            post.innerHTML = renderMarkdown(parts[1]);
            msgDiv.appendChild(post);
          }
        } else {
          msgDiv.innerHTML = renderMarkdown(text);
        }

        inner.appendChild(avatar);
        inner.appendChild(msgDiv);
        row.appendChild(inner);
      } else {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message user-msg';
        msgDiv.textContent = text;
        row.appendChild(msgDiv);
      }

      chatBox.appendChild(row);
      role === 'user' ? scrollToBottom() : scrollToElement(row);
    }

    /* ── Markdown renderer ───────────────────────────────────────────────────── */
    function renderMarkdown(text) {
      return text
        .replace(/\[\[OPEN_DEMO_FORM\]\]/g, '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        // Bold
        .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
        // Italic
        .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
        // Inline code
        .replace(/`([^`\n]+)`/g, '<code>$1</code>')
        // Bullet lists
        .replace(/^[•\-\*] (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        // Links
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+|mailto:[^\s)]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
        // Line breaks
        .replace(/\n/g, '<br>');
    }

      inner.appendChild(avatar);

      row.appendChild(inner);
      chatBox.appendChild(row);

    function hideTyping() {
      const el = document.getElementById('typing-indicator-row');
      if (el) el.remove();

    async function sendMessage() {
      const inputField = document.getElementById('user-input');
      const text       = inputField.value.trim();
      if (!text) return;

      appendMessage('user', text);
      messages.push({ role: 'user', content: text });

      const cleanMessages = messages.map(m => ({
        role:    m.role,
        content: typeof m.content === 'string'
          ? m.content.replace(
   /\[\[OPEN_DEMO_FORM\]\]/g,
   '[form shown to user]'
)
          : m.content,
      }));

      try {
    const response = await fetch(`${SERVER}/chat`, {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json'
  },
 body: JSON.stringify({
  messages,
  agentName: _selectedAgent.name
})
});

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error || `Server error ${response.status}`);
        }

        const data = await response.json();

hideTyping();

        // Human-like pause before reply appears (800ms–1800ms)
        const _humanDelay = 800 + Math.floor(Math.random() * 1000);
        await new Promise(resolve => setTimeout(resolve, _humanDelay));

        showTyping();

        // Brief "reading" pause then show reply (600ms–1200ms)
        const _readDelay = 600 + Math.floor(Math.random() * 600);
        await new Promise(resolve => setTimeout(resolve, _readDelay));

        hideTyping();

/* =========================================
   LEADERSHIP CARD RESPONSE
========================================= */

if (data.type === 'leadership_cards') {

  renderLeadershipCards(
    data.leaders,
    data.title || 'Leadership Team'
  );

  messages.push({
    role: 'assistant',
    content: '[Leadership Cards]'
  });

} else {

  messages.push({
    role: 'assistant',
    content: data.content
  });

  appendMessage(
    'assistant',
    data.content,
    data.sourceUsed || null
  );
}

      } catch (error) {
        console.error('Chat error:', error);
        hideTyping();
        appendMessage('assistant', "Sorry, I'm unable to connect right now. Please try again in a moment.");
      } finally {
        sendBtn.disabled = false;
        inputField.focus();
      }
    }

    /* ── Build demo form ─────────────────────────────────────────────────────── */
    function buildDemoForm(formId) {
      const wrapper   = document.createElement('div');

      // Time

      ['09:00 AM','10:00 AM','11:00 AM','12:00 PM','01:00 PM','02:00 PM','03:00 PM','04:00 PM','05:00 PM','06:00 PM']
        .forEach(t => {
          const o = document.createElement('option');
          o.value = t; o.textContent = t;
          timeSelect.appendChild(o);
        });
      timeGroup.appendChild(timeSelect);
      wrapper.appendChild(timeGroup);

      // Timezone
      wrapper.appendChild(buildTimezoneField(formId));

      const btn = document.createElement('button');
      btn.className = 'demo-submit-btn';

    /* ── Text field builder ──────────────────────────────────────────────────── */
    function buildTextField({
  formId,
  fieldId,
  label,
  placeholder,
  type,
  min,
  max,
  isEmail,
  counter
}) {

  const group = document.createElement('div');

  group.className = 'form-field-group';

  group.appendChild(
    makeLabel(label, true)
  );

  const input = document.createElement('input');

  input.type = type;

  input.id = `${formId}-${fieldId}`;

  input.placeholder = placeholder;

  input.maxLength = max;

  if (type !== 'email') {
    input.setAttribute('data-min', min);
  }

  input.setAttribute('data-max', max);

  if (isEmail) {
    input.setAttribute('data-email', 'true');
  }

  input.setAttribute(
    'aria-label',
    label
  );

  const errMsg = document.createElement('div');

  errMsg.className = 'field-error-msg';

  errMsg.id =
    `${formId}-${fieldId}-err`;

  errMsg.setAttribute(
    'role',
    'alert'
  );

  errMsg.setAttribute(
    'aria-live',
    'polite'
  );

  /* =========================
     MASKING FUNCTIONALITY
  ========================= */

  let inputContainer = input;

  if (
    fieldId === 'email' ||
    fieldId === 'phone'
  ) {

    const wrapper =
      document.createElement('div');

    wrapper.className =
      'masked-input-wrapper';

    const eyeBtn =
      document.createElement('button');

    eyeBtn.type = 'button';

    eyeBtn.className =
      'mask-toggle-btn';

    eyeBtn.innerHTML = '👁';

    eyeBtn.dataset.visible = 'false';

    const originalType = type;

    

    input.classList.add('masked');

eyeBtn.addEventListener(
  'click',
  () => {

    const visible =
      eyeBtn.dataset.visible === 'true';

    if (visible) {

      input.classList.add('masked');

      eyeBtn.innerHTML = '👁';

      eyeBtn.dataset.visible =
        'false';

    } else {

      input.classList.remove('masked');

      eyeBtn.innerHTML = '🙈';

      eyeBtn.dataset.visible =
        'true';
    }
  }
);
    wrapper.appendChild(input);

    wrapper.appendChild(eyeBtn);

    inputContainer = wrapper;
  }

  /* ========================= */

  if (counter || min >= 10) {

    const charDiv =
      document.createElement('div');

    charDiv.className =
      'char-counter';

    charDiv.id =
      `${formId}-${fieldId}-counter`;

    charDiv.textContent =
      `${max} characters remaining`;

    input.addEventListener(
      'input',
      () => {

        updateCharCounter(
          charDiv,
          max - input.value.length,
          max
        );

        validateField(
          input,
          errMsg,
          { min, max, isEmail }
        );
      }
    );

    input.addEventListener(
      'blur',
      () =>
        validateField(
          input,
          errMsg,
          { min, max, isEmail }
        )
    );

    group.appendChild(
      inputContainer
    );

    group.appendChild(errMsg);

    group.appendChild(charDiv);

  } else {

    input.addEventListener(
      'input',
      () =>
        validateField(
          input,
          errMsg,
          { min, max, isEmail }
        )
    );

    input.addEventListener(
      'blur',
      () =>
        validateField(
          input,
          errMsg,
          { min, max, isEmail }
        )
    );

    group.appendChild(
      inputContainer
    );

    group.appendChild(errMsg);
  }

  return group;
}
    function makeLabel(text, required = false) {
      const label     = document.createElement('div');
      label.className = 'form-field-label';
      label.textContent = text;
      if (required) {
        const star = document.createElement('span');
        star.className   = 'required-star';
        star.textContent = '*';
        star.setAttribute('aria-hidden', 'true');
        label.appendChild(star);
      }
      return label;
    }

    function updateCharCounter(el, remaining, max) {
      const pct = remaining / max;
      el.classList.remove('warn', 'danger');
      if (remaining <= 0) {
        el.textContent = 'Maximum limit reached';
        el.classList.add('danger');
      } else if (pct < 0.15) {
        el.textContent = `Only ${remaining} char${remaining === 1 ? '' : 's'} left`;
        el.classList.add('danger');
      } else if (pct < 0.25) {
        el.textContent = `${remaining} characters remaining`;
        el.classList.add('warn');
      } else {
        el.textContent = `${remaining} characters remaining`;
      }
    }

    function validateField(input, errEl, { min, max, isEmail } = {}) {
      const val = input.value.trim();
      let error = '';

      if (!val) {
        error = 'This field is required.';
      } else if (isEmail) {
        if (!/^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/.test(val)) {
          error = 'Please enter a valid business email address.';
        }
      } else {
        if (min && val.length < min) error = `Must be at least ${min} characters.`;
        else if (max && val.length > max) error = `Cannot exceed ${max} characters.`;
      }

      if (error) {
        input.classList.add('input-error');
        input.classList.remove('input-success');
        errEl.textContent = error;
        errEl.classList.add('visible');
        return false;
      } else {
        input.classList.remove('input-error');
        input.classList.add('input-success');
        errEl.classList.remove('visible');
        return true;
      }
    }

            opt.addEventListener('click', () => {

    /* ── Timezone field ──────────────────────────────────────────────────────── */
    function buildTimezoneField(formId) {
      const group     = document.createElement('div');
      group.className = 'form-field-group';
      group.appendChild(makeLabel('Timezone', true));

      const wrapper   = document.createElement('div');
      wrapper.className = 'timezone-wrapper';

      let selectedTz = TIMEZONES[0]; // IST default

      const btn = document.createElement('button');
      btn.type  = 'button';
      btn.className = 'tz-btn';
      btn.id    = `${formId}-tz-btn`;
      btn.setAttribute('aria-haspopup', 'listbox');
      btn.setAttribute('aria-expanded',  'false');

      function renderBtnText() {
        btn.innerHTML = `<span class="tz-value">${selectedTz.abbr} (${selectedTz.offset}) — ${selectedTz.label}</span><span class="tz-arrow">▾</span>`;
      }
      renderBtnText();

      const dropdown   = document.createElement('div');
      dropdown.className = 'tz-dropdown';
      dropdown.setAttribute('role', 'listbox');

      const searchBox  = document.createElement('div');
      searchBox.className = 'tz-search-box';
      const searchInput   = document.createElement('input');
      searchInput.className   = 'tz-search-input';
      searchInput.placeholder = 'Search timezone…';
      searchInput.setAttribute('aria-label', 'Search timezones');
      searchBox.appendChild(searchInput);
      dropdown.appendChild(searchBox);

      const tzList    = document.createElement('div');
      tzList.className = 'tz-list';

      function renderTzList(filter = '') {
        tzList.innerHTML = '';
        const filtered  = TIMEZONES.filter(tz =>
          tz.label.toLowerCase().includes(filter.toLowerCase()) ||
          tz.abbr.toLowerCase().includes(filter.toLowerCase()) ||
          tz.offset.toLowerCase().includes(filter.toLowerCase())
        );
        let lastGroup = '';
        filtered.forEach(tz => {
          if (tz.group !== lastGroup) {
            const gLabel = document.createElement('div');
            gLabel.className   = 'tz-group-label';
            gLabel.textContent = tz.group;
            tzList.appendChild(gLabel);
            lastGroup = tz.group;
          }
          const opt = document.createElement('div');
          opt.className = 'tz-option' + (tz.value === selectedTz.value ? ' selected' : '');
          opt.setAttribute('role', 'option');
          opt.innerHTML = `<span class="tz-offset">${tz.offset}</span><span class="tz-abbr">${tz.abbr}</span><span class="tz-label">${tz.label}</span>`;
          opt.addEventListener('click', () => {
            selectedTz = tz;
            renderBtnText();
            dropdown.classList.remove('open');
            btn.setAttribute('aria-expanded', 'false');
          });
          tzList.appendChild(opt);
        });
      }

      renderTzList();
      searchInput.addEventListener('input', () => renderTzList(searchInput.value));
      dropdown.appendChild(tzList);

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = dropdown.classList.contains('open');
        document.querySelectorAll('.tz-dropdown.open').forEach(el => el.classList.remove('open'));
        if (!isOpen) {
          dropdown.classList.add('open');
          btn.setAttribute('aria-expanded', 'true');
          setTimeout(() => searchInput.focus(), 50);
        }
      });

      // Hidden input stores the selected timezone display value
      const hidden    = document.createElement('input');
      hidden.type     = 'hidden';
      hidden.id       = `${formId}-timezone`;
      Object.defineProperty(hidden, 'value', {
        get() { return `${selectedTz.abbr} (${selectedTz.offset})`; }
      });

      wrapper.appendChild(btn);
      wrapper.appendChild(dropdown);
      wrapper.appendChild(hidden);
      group.appendChild(wrapper);
      return group;
    }

    /* ── Submit handler ──────────────────────────────────────────────────────── */
    function submitDemoForm(formId, btn, wrapper) {
      const get = (field) => {
        const el = document.getElementById(`${formId}-${field}`);
        return el ? el.value.trim() : '';
      };

      const name    = get('name');
      const email   = get('email');
      const company = get('company');
      const req     = get('req');
      const date    = get('date');
      const time    = get('time');
      const tzEl    = document.getElementById(`${formId}-timezone`);
      const timezone = tzEl ? tzEl.value : '';
      const ccBtn   = document.getElementById(`${formId}-cc-btn`);
      const codeEl  = ccBtn ? ccBtn.querySelector('.cc-code') : null;
      const dialCode = codeEl ? codeEl.textContent : '+91';
      const phoneNum = get('phone');

      // Run validations
      let hasError = false;

      [
        { id: `${formId}-name`,    opts: { min: 2,  max: 60  } },
        { id: `${formId}-company`, opts: { min: 2,  max: 100 } },
        { id: `${formId}-email`,   opts: { min: 5,  max: 100, isEmail: true } },
        { id: `${formId}-req`,     opts: { min: 10, max: 500 } },
      ].forEach(({ id, opts }) => {
        const el    = document.getElementById(id);
        const errEl = document.getElementById(`${id}-err`);
        if (el && errEl && !validateField(el, errEl, opts)) hasError = true;
      });

      if (!date || !time) hasError = true;

      const phoneErrEl = document.getElementById(`${formId}-phone-err`);
      if (!phoneNum || phoneNum.length < 6 || phoneNum.length > 15) {
        hasError = true;
        if (phoneErrEl) {
          phoneErrEl.textContent = 'Enter a valid phone number (6–15 digits).';
          phoneErrEl.classList.add('visible');
        }
      } else if (phoneErrEl) {
        phoneErrEl.classList.remove('visible');
      }

      if (hasError) {
        wrapper.classList.remove('shake');
        void wrapper.offsetWidth;
        wrapper.classList.add('shake');
        setTimeout(() => wrapper.classList.remove('shake'), 500);
        return;
      }

      // Disable form and show loading
      setFormDisabled(formId, true);
      btn.innerHTML = '<span>⏳</span> Scheduling…';
      btn.disabled  = true;

      const phone = `${dialCode}${phoneNum}`;

      fetch(`${SERVER}/schedule-demo`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ name, email, company, requirement: req, date, time, timezone, phone }),
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) showSuccessCard(wrapper, email);
        else showErrorCard(wrapper, formId, data.error || 'Failed to schedule demo.');
      })
      .catch(err => {
        console.error('Demo submit error:', err);
        showErrorCard(wrapper, formId, 'Connection error. Please try again.');
      });
    }

    function setFormDisabled(formId, disabled) {
      const wrapper = document.getElementById(formId);
      if (!wrapper) return;
      wrapper.querySelectorAll('input, select, button').forEach(el => el.disabled = disabled);
    }

    function showSuccessCard(wrapper, email) {
      wrapper.innerHTML = `
        <div class="success-card">
          <div class="success-icon">✅</div>
          <h4>Demo Confirmed</h4>
          <p class="success-short-text">Confirmation sent to</p>
          <div class="email-pill">${escapeHtml(email)}</div>
        </div>`;
      scrollToBottom();
    }

    function showErrorCard(wrapper, formId, errorMsg) {
      wrapper.innerHTML = '';
      const card = document.createElement('div');
      card.className = 'error-card';
      const msg = document.createElement('strong');
      msg.textContent = `✗ ${errorMsg}`;
      card.appendChild(msg);

      const retryBtn = document.createElement('button');
      retryBtn.className   = 'retry-btn';
      retryBtn.textContent = 'Try Again';
      retryBtn.type        = 'button';
      retryBtn.addEventListener('click', (e) => {
        e.preventDefault();
        wrapper.innerHTML = '';
        const newForm = buildDemoForm(formId);
        Array.from(newForm.children).forEach(child => wrapper.appendChild(child));
        scrollToBottom();
      });
      card.appendChild(retryBtn);
      wrapper.appendChild(card);
      scrollToBottom();
    }

    /* ── Scroll helpers ──────────────────────────────────────────────────────── */
    function scrollToBottom() {
      const chatBox = document.getElementById('chat-box');
      chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    function scrollToElement(el) {
      const chatBox = document.getElementById('chat-box');
      const boxTop  = chatBox.getBoundingClientRect().top;
      const elTop   = el.getBoundingClientRect().top;
      const offset  = elTop - boxTop - 12;
      chatBox.scrollBy({ top: offset, behavior: 'smooth' });
    }
