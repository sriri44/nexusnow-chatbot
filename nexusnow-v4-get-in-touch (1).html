  function renderGetInTouchForm(delay = 0) {
    return new Promise(resolve => {
      setTimeout(() => {
        const formId = `nn-git-form-${Date.now()}`;
        const el = document.createElement('div');
        el.className = 'nn-git-form-block';
        el.id = formId;
        el.innerHTML = `
          <div class="nn-git-form-card">
            <div class="nn-git-form-title">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="var(--nn-blue)" stroke-width="2" stroke-linecap="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              Contact Details
            </div>

            <div class="nn-git-field-group">
              <!-- Name -->
              <div class="nn-git-field">
                <label class="nn-git-label" for="${formId}-name">Full Name *</label>
                <input id="${formId}-name" class="nn-git-input" type="text" placeholder="e.g. Rahul Sharma" autocomplete="name" />
                <span class="nn-git-error-msg" id="${formId}-name-err"></span>
              </div>

              <!-- Phone -->
              <div class="nn-git-field">
                <label class="nn-git-label" for="${formId}-phone">Phone Number *</label>
                <input id="${formId}-phone" type="tel" class="nn-git-input" placeholder="e.g. 9876543210" />
                <span class="nn-git-error-msg" id="${formId}-phone-err"></span>
              </div>

              <!-- Email -->
              <div class="nn-git-field">
                <label class="nn-git-label" for="${formId}-email">Email Address *</label>
                <input id="${formId}-email" class="nn-git-input" type="email" placeholder="e.g. rahul@company.com" autocomplete="email" />
                <span class="nn-git-error-msg" id="${formId}-email-err"></span>
              </div>
            </div>

            <!-- Consent -->
            <div class="nn-git-consent-row" id="${formId}-consent-row">
              <input class="nn-git-checkbox" type="checkbox" id="${formId}-consent" />
              <label class="nn-git-consent-label" for="${formId}-consent">
                I agree to be contacted by the team
              </label>
            </div>
            <span class="nn-git-error-msg" id="${formId}-consent-err" style="margin-bottom:10px;display:block;"></span>

            <!-- Submit -->
            <button class="nn-git-submit-btn" id="${formId}-submit" onclick="NN.submitGetInTouch('${formId}')">
              <span class="nn-git-submit-spinner"></span>
              <span class="nn-git-submit-text">Send Message →</span>
            </button>
          </div>`;

        $body.insertBefore(el, $anchor);

        // ── intl-tel-input: Git Form phone ──
        const gitPhoneEl = document.getElementById(`${formId}-phone`);
        const gitIti = window.intlTelInput(gitPhoneEl, {
          initialCountry: "in",
          separateDialCode: true,
          preferredCountries: ["in", "us", "gb"],
          utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/utils.js"
        });
        // Store iti instance on element for retrieval in submit
        gitPhoneEl._iti = gitIti;

        // Focus first field
        setTimeout(() => {
          const nameInput = document.getElementById(`${formId}-name`);
          if (nameInput) nameInput.focus();

          // Enter key navigation between fields
          [`${formId}-name`, `${formId}-phone`, `${formId}-email`].forEach((id, idx, arr) => {
            const inp = document.getElementById(id);
            if (!inp) return;
            inp.addEventListener('keydown', e => {
              if (e.key === 'Enter') {
                e.preventDefault();
                if (idx < arr.length - 1) {
                  document.getElementById(arr[idx + 1])?.focus();
                } else {
                  NN.submitGetInTouch(`${formId}`);
                }
              }
            });
          });
        }, 80);

        resolve(el);
      }, delay);
    });
  }

  async function submitGetInTouch(formId) {
    const nameEl    = document.getElementById(`${formId}-name`);
    const phoneEl   = document.getElementById(`${formId}-phone`);
    const emailEl   = document.getElementById(`${formId}-email`);
    const consentEl = document.getElementById(`${formId}-consent`);
    const submitBtn = document.getElementById(`${formId}-submit`);

    // — Validate —
    let hasError = false;

    function setError(inputEl, errId, msg) {
      const errEl = document.getElementById(errId);
      if (msg) {
        inputEl.classList.add('nn-git-error');
        if (errEl) errEl.textContent = msg;
        hasError = true;
      } else {
        inputEl.classList.remove('nn-git-error');
        if (errEl) errEl.textContent = '';
      }
    }

    const nameVal  = nameEl?.value.trim() || '';
    // ── intl-tel-input: retrieve full number from iti instance ──
    const gitItiInst = phoneEl?._iti;
    const phoneVal = gitItiInst ? gitItiInst.getNumber() : (phoneEl?.value.trim() || '');
    const emailVal = emailEl?.value.trim() || '';

    setError(nameEl, `${formId}-name-err`,
      !nameVal ? 'Full name is required.' : null);

    // ── intl-tel-input: validate using iti.isValidNumber() ──
    const phoneEmpty = !phoneEl?.value.trim();
    const phoneInvalid = gitItiInst ? !gitItiInst.isValidNumber() : !/^\d{7,15}$/.test(phoneVal.replace(/\D/g,''));
    setError(phoneEl, `${formId}-phone-err`,
      phoneEmpty ? 'Phone number is required.' :
      phoneInvalid ? 'Enter a valid phone number with country code.' : null);

    setError(emailEl, `${formId}-email-err`,
      !emailVal ? 'Email address is required.' :
      !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal) ? 'Enter a valid email address.' : null);

    // Consent
    const consentRow = document.getElementById(`${formId}-consent-row`);
    const consentErrEl = document.getElementById(`${formId}-consent-err`);
    if (!consentEl?.checked) {
      consentRow?.classList.add('nn-git-error');
      if (consentErrEl) consentErrEl.textContent = 'You must agree to be contacted.';
      hasError = true;
    } else {
      consentRow?.classList.remove('nn-git-error');
      if (consentErrEl) consentErrEl.textContent = '';
    }

    if (hasError) return;

    // — Loading state —
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
    }

    // — Build payload —
    const payload = {
      name:      nameVal,
      phone:     phoneVal,
      email:     emailVal,
      consent:   true,
      timestamp: new Date().toISOString()
    };

    // — POST to Google Script —
    try {
      await fetch(GIT_GOOGLE_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
        headers: { 'Content-Type': 'application/json' }
      });
    } catch (e) {
      // Network errors are silently swallowed — success UI still shown
      console.warn('NexusNow Get in Touch: fetch error', e);
    }

    // — Disable the entire form —
    [nameEl, phoneEl, emailEl, consentEl].forEach(el => { if (el) el.disabled = true; });
    // Disable iti flag button as well
    if (gitItiInst) { try { gitItiInst.setDisabled(true); } catch(e) { /* no-op */ } }
    if (submitBtn) { submitBtn.disabled = true; submitBtn.classList.remove('loading'); }

    // — Render user bubble summary —
    renderUserSelection(`📬 ${nameVal} · ${emailVal}`);

    // — Success message —
    await renderGetInTouchSuccess(600);
  }

  function renderGetInTouchSuccess(delay = 0) {
    return new Promise(resolve => {
      setTimeout(async () => {
        // Success card
        const el = document.createElement('div');
        el.className = 'nn-success-block';
        el.innerHTML = `
          <div class="nn-success-card">
            <div class="nn-success-icon">✅</div>
            <div class="nn-success-title">Thank you! We will contact you shortly.</div>
            <div class="nn-success-sub">Our team has received your details and will reach out to you soon.</div>
          </div>`;
        $body.insertBefore(el, $anchor);

        // Post-success actions
        await renderChips('What would you like to do next?', [
          { label: '🤝 Book a Consultation', onclick: `NN.startExpertFlow(null)` },
          { label: '⌂ Main Menu', cls: 'home-chip', onclick: 'NN.restartChat()' }
        ], 500);

        resolve();
      }, delay);
    });
  }

  /* ─────────────────────────────────────────────
     PUBLIC API
  ───────────────────────────────────────────── */
  window.NN = {
    toggle,
    restartChat: () => renderHomePatched(true),
    showAllCategories,
    selectCategory: selectCategoryTracked,
    selectFAQ: (catIndex, faqIndex, cardId) => {
      checkConsultationTrigger();
      return selectFAQWithTeam(catIndex, faqIndex, cardId);
    },
    renderHome: renderHomePatched,
    startExpertFlow,
    submitLeadStep,
    leadBack,
    selectDate,
    selectTime,
    confirmBooking,
    openWhatsApp,
    handleTextInput,
    toggleTeamBio,
    startGetInTouchFlow,
    submitGetInTouch
  };

  // Override the initialized renderHome call inside toggle()
  const _origToggle = toggle;
  function togglePatched() {
    state.open = !state.open;
    $box.classList.toggle('open', state.open);
    $fab.classList.toggle('open', state.open);
    if (state.open) {
      $badge.classList.add('hidden');
      if (!state.initialized) {
        state.initialized = true;
        renderHomePatched(false);
      }
    }
  }
  document.getElementById('nn-fab').onclick = togglePatched;

})();
</script>
